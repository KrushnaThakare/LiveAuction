spring.application.name=cricket-auction-backend
server.port=8080

# Compress JSON API responses for public broadcaster/overlay traffic.
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cricket_auction?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=120000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Local image storage directory (images downloaded from Drive at upload time)
app.images.storage-dir=${UPLOAD_DIR:/tmp/cricket-auction-images}

# Registration file uploads
app.upload.base-dir=${UPLOAD_DIR:/tmp/cricket-auction-uploads}

# JWT
app.jwt.secret=${JWT_SECRET:CricketAuction_SuperSecretKey_ChangeMeInProduction_2026!}
app.jwt.expiration-ms=86400000

# Default super-admin credentials (change after first login)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Logging
logging.level.com.cricketauction=INFO

# Public backend base URL used for absolute links in exports (set in production)
app.public-base-url=${PUBLIC_BASE_URL:}

# Cloudinary (optional): when set, uploads are stored persistently in Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Optional Google Apps Script webhook to append registrations to a Google Sheet
app.sheets.webhook-url=${GOOGLE_SHEETS_WEBHOOK_URL:}

# WhatsApp Cloud API — automatic sold-player congratulations
whatsapp.enabled=${WHATSAPP_ENABLED:false}
whatsapp.api-token=${WHATSAPP_API_TOKEN:}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.api-version=${WHATSAPP_API_VERSION:v21.0}
whatsapp.template-name=${WHATSAPP_TEMPLATE_NAME:player_sold_congrats}
whatsapp.template-language=${WHATSAPP_TEMPLATE_LANGUAGE:en}
# template (production) or text (sandbox / 24h window only)
whatsapp.mode=${WHATSAPP_MODE:template}

# Optional authenticated CricHeroes browser worker. Recommended for paid accounts.
cricheroes.worker.url=${CRICHEROES_WORKER_URL:}
cricheroes.worker.token=${CRICHEROES_WORKER_TOKEN:}
